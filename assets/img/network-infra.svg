<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  
  <!-- Central Router -->
  <rect x="155" y="95" width="90" height="55" fill="#2d3436" rx="8" stroke="#00b4d8" stroke-width="2"/>
  <circle cx="178" cy="112" r="6" fill="#00ff00"/>
  <circle cx="198" cy="112" r="6" fill="#00ff00"/>
  <circle cx="218" cy="112" r="6" fill="#f39c12"/>
  <circle cx="238" cy="112" r="6" fill="#00b4d8"/>
  <rect x="170" y="128" width="60" height="12" fill="#0d1117" rx="3"/>
  <text x="200" y="138" font-family="Arial, sans-serif" font-size="9" fill="#00b4d8" text-anchor="middle" font-weight="bold">CISCO</text>
  
  <!-- VLAN SISR (top left) -->
  <rect x="40" y="25" width="75" height="40" fill="#1a1a2e" rx="5" stroke="#3498db" stroke-width="2"/>
  <text x="77" y="42" font-family="monospace" font-size="9" fill="#3498db" text-anchor="middle">VLAN 10</text>
  <text x="77" y="57" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">SISR</text>
  
  <!-- VLAN SLAM (top right) -->
  <rect x="285" y="25" width="75" height="40" fill="#1a1a2e" rx="5" stroke="#9b59b6" stroke-width="2"/>
  <text x="322" y="42" font-family="monospace" font-size="9" fill="#9b59b6" text-anchor="middle">VLAN 20</text>
  <text x="322" y="57" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">SLAM</text>
  
  <!-- VLAN Admin (bottom left) -->
  <rect x="40" y="180" width="75" height="40" fill="#1a1a2e" rx="5" stroke="#e74c3c" stroke-width="2"/>
  <text x="77" y="197" font-family="monospace" font-size="9" fill="#e74c3c" text-anchor="middle">VLAN 30</text>
  <text x="77" y="212" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Admin</text>
  
  <!-- VLAN Serveurs (bottom right) -->
  <rect x="285" y="180" width="75" height="40" fill="#1a1a2e" rx="5" stroke="#27ae60" stroke-width="2"/>
  <text x="322" y="197" font-family="monospace" font-size="9" fill="#27ae60" text-anchor="middle">VLAN 40</text>
  <text x="322" y="212" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Serveurs</text>
  
  <!-- Connection Lines -->
  <line x1="115" y1="55" x2="160" y2="105" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="55" x2="240" y2="105" stroke="#9b59b6" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="115" y1="190" x2="160" y2="140" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="190" x2="240" y2="140" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  
  <!-- WiFi Symbol -->
  <g transform="translate(175, 155)">
    <path d="M25 12 Q15 20, 25 28" fill="none" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
    <path d="M25 16 Q19 20, 25 24" fill="none" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
    <circle cx="25" cy="20" r="3" fill="#f39c12"/>
  </g>
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="10" fill="#f39c12" text-anchor="middle" font-weight="bold">WPA3 + 802.1X</text>
  
  <!-- Shield Icon -->
  <path d="M200 210 L180 222 L180 240 Q180 255, 200 262 Q220 255, 220 240 L220 222 Z" fill="#27ae60" opacity="0.9"/>
  <path d="M192 235 L198 241 L210 228" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Title -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Infrastructure Réseau Sécurisée - IRIS Nice</text>
</svg>
