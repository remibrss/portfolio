<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  
  <!-- Laptop -->
  <rect x="130" y="60" width="140" height="85" fill="#111" rx="6"/>
  <rect x="137" y="67" width="126" height="71" fill="#1a1a2e"/>
  
  <!-- Screen Content - Terminal Style -->
  <rect x="142" y="72" width="116" height="61" fill="#0d1117" rx="2"/>
  <text x="150" y="86" font-family="monospace" font-size="8" fill="#00ff00">$ diagnostics --run</text>
  <text x="150" y="98" font-family="monospace" font-size="8" fill="#00b4d8">CPU: Intel i5 ... OK</text>
  <text x="150" y="110" font-family="monospace" font-size="8" fill="#00b4d8">RAM: 8GB DDR4 ... OK</text>
  <text x="150" y="122" font-family="monospace" font-size="8" fill="#00ff00">✓ Ready for sale</text>
  
  <!-- Laptop Base -->
  <rect x="115" y="145" width="170" height="10" fill="#333" rx="2"/>
  <ellipse cx="200" cy="150" rx="20" ry="3" fill="#222"/>
  
  <!-- Desktop PC -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="40" height="60" fill="#2d3436" rx="4"/>
    <circle cx="20" cy="12" r="5" fill="#00b4d8"/>
    <rect x="8" y="24" width="24" height="3" fill="#636e72"/>
    <rect x="8" y="32" width="24" height="3" fill="#636e72"/>
    <rect x="8" y="40" width="24" height="3" fill="#636e72"/>
    <circle cx="20" cy="52" r="4" fill="#27ae60"/>
  </g>
  
  <!-- Tools -->
  <g transform="translate(300, 70)">
    <rect x="0" y="0" width="40" height="60" fill="#1a1a2e" rx="4" stroke="#f39c12" stroke-width="1"/>
    <!-- Wrench -->
    <path d="M12 15 L20 23 L17 26 L25 34 L28 31 L20 23 L23 20 L15 12 Z" fill="#f39c12"/>
    <!-- Screwdriver -->
    <rect x="22" y="35" width="4" height="18" fill="#00b4d8" rx="1"/>
    <rect x="20" y="50" width="8" height="6" fill="#ffc107" rx="1"/>
  </g>
  
  <!-- Checkmark Badge -->
  <g transform="translate(175, 165)">
    <circle cx="25" cy="25" r="22" fill="#27ae60" opacity="0.9"/>
    <path d="M15 25 L22 32 L35 18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Icons Row - Below (bien alignés) -->
  <g transform="translate(80, 220)">
    <circle cx="15" cy="15" r="14" fill="url(#accent)" opacity="0.3"/>
    <text x="15" y="19" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">🔧</text>
    <text x="15" y="42" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">Diagnostic</text>
  </g>
  <g transform="translate(145, 220)">
    <circle cx="15" cy="15" r="14" fill="#f39c12" opacity="0.3"/>
    <text x="15" y="19" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">💻</text>
    <text x="15" y="42" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">Réparation</text>
  </g>
  <g transform="translate(210, 220)">
    <circle cx="15" cy="15" r="14" fill="#27ae60" opacity="0.3"/>
    <text x="15" y="19" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">✓</text>
    <text x="15" y="42" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">Validation</text>
  </g>
  <g transform="translate(275, 220)">
    <circle cx="15" cy="15" r="14" fill="#9b59b6" opacity="0.3"/>
    <text x="15" y="19" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">🏷️</text>
    <text x="15" y="42" font-family="Arial" font-size="7" fill="#aaa" text-anchor="middle">Vente</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Support Technique - Actif Azur</text>
</svg>
